<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Taymer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #141e30, #243b55); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; }
        .container { text-align: center; max-width: 500px; width: 100%; }
        h2 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }
        input[type="datetime-local"] { padding: 12px; border: none; border-radius: 8px; font-size: 16px; margin-bottom: 25px; background: rgba(255,255,255,0.1); color: white; }
        .timer { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .time-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; min-width: 80px; backdrop-filter: blur(5px); }
        .time-box .num { font-size: 32px; font-weight: bold; color: #00d4ff; }
        .time-box .lbl { font-size: 12px; color: #aaa; margin-top: 5px; text-transform: uppercase; }
        .message { color: #ffcc00; font-size: 18px; min-height: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⏳ COUNTDOWN</h2>
        <input type="datetime-local" id="targetDate">
        <div class="timer">
            <div class="time-box"><div class="num" id="days">00</div><div class="lbl">Kun</div></div>
            <div class="time-box"><div class="num" id="hours">00</div><div class="lbl">Soat</div></div>
            <div class="time-box"><div class="num" id="minutes">00</div><div class="lbl">Daqiqa</div></div>
            <div class="time-box"><div class="num" id="seconds">00</div><div class="lbl">Soniya</div></div>
        </div>
        <div class="message" id="msg">Sana tanlang va kuting...</div>
    </div>

    <script>
        let interval;
        const targetInput = document.getElementById('targetDate');

        targetInput.addEventListener('change', () => {
            clearInterval(interval);
            if (!targetInput.value) return;
            updateTimer();
            interval = setInterval(updateTimer, 1000);
        });

        function updateTimer() {
            const target = new Date(targetInput.value).getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                clearInterval(interval);
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('msg').textContent = '🎉 Vaqt keldi!';
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(d).padStart(2, '0');
            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');
            document.getElementById('msg').textContent = 'Qoldi...';
        }
    </script>
</body>
</html>
